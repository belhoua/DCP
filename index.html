<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/wolf.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Belhouari Othmane — Full Stack Developer based in Oujda, Morocco. Web development, automation and AI-assisted tooling." />
    <title>belhouari othmane</title>

    <!-- Preload the heaviest intro assets so they download in parallel with the JS -->
    <link rel="preload" as="image" href="/textures/earth-blue-marble.jpg" />
    <link rel="preload" as="image" href="/textures/earth_clouds_1024.png" />
    <link rel="preload" as="image" href="/wolf.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var dark = stored ? stored === 'dark' : true; // dark-first
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <!-- Instant preloader: shown immediately, before React/Three load -->
    <style>
      #app-preloader{position:fixed;inset:0;z-index:11000;display:flex;flex-direction:column;
        align-items:center;justify-content:center;gap:22px;background:
        radial-gradient(900px 520px at 80% -8%, rgba(124,108,240,.10), transparent 60%),
        radial-gradient(700px 460px at -8% 18%, rgba(251,85,117,.08), transparent 58%), #040406;
        transition:opacity .6s ease, visibility .6s ease;font-family:"Space Grotesk",system-ui,sans-serif}
      #app-preloader.hide{opacity:0;visibility:hidden;pointer-events:none}
      #app-preloader .pl-logo{position:relative;height:84px;width:84px;display:grid;place-items:center}
      #app-preloader .pl-logo img{height:46px;width:46px;filter:drop-shadow(0 0 12px rgba(124,108,240,.55))}
      #app-preloader .pl-ring{position:absolute;inset:0;border-radius:50%;
        border:2px solid transparent;border-top-color:#fb5575;border-right-color:#8a7bf5;
        animation:pl-spin 1s linear infinite}
      #app-preloader .pl-ring.two{inset:8px;border-top-color:transparent;border-bottom-color:#2dd4bf;
        animation-duration:1.5s;animation-direction:reverse;opacity:.7}
      #app-preloader .pl-name{font-size:.72rem;letter-spacing:.34em;text-transform:uppercase;
        color:#9094b2;font-family:"JetBrains Mono",monospace}
      #app-preloader .pl-bar{width:130px;height:2px;border-radius:2px;overflow:hidden;background:rgba(255,255,255,.08)}
      #app-preloader .pl-bar i{display:block;height:100%;width:40%;border-radius:2px;
        background:linear-gradient(90deg,#fb5575,#8a7bf5,#2dd4bf);animation:pl-load 1.1s ease-in-out infinite}
      @keyframes pl-spin{to{transform:rotate(360deg)}}
      @keyframes pl-load{0%{transform:translateX(-130%)}100%{transform:translateX(330%)}}
      @media (prefers-reduced-motion: reduce){
        #app-preloader .pl-ring,#app-preloader .pl-bar i{animation:none}
      }
    </style>
  </head>
  <body>
    <div id="app-preloader">
      <div class="pl-logo">
        <span class="pl-ring"></span>
        <span class="pl-ring two"></span>
        <img src="/wolf.svg" alt="" />
      </div>
      <div class="pl-name">Belhouari&nbsp;Othmane</div>
      <div class="pl-bar"><i></i></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
